<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>IOMA - Sistema de Trámites</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00AEC3",
                        "secondary": "#e81f76",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Public Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div class="relative flex min-h-screen flex-col">
        <!-- Top Navbar -->
        <header class="w-full flex items-center justify-between px-0 h-16 shadow-md" style="background: linear-gradient(to right, #00AEC3, #e81f76);">
            <div class="flex items-center h-full">
                <div class="h-full flex items-center px-4">
                    <img alt="IOMA Logo" class="h-10 w-auto object-contain" src="logosNavbar/logo IOAMA esquina izquierda.png"/>
                </div>
                <button class="text-white px-4 hover:bg-white/10 transition-colors" onclick="document.getElementById('sidebar').classList.toggle('hidden')">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>
            <div class="flex items-center gap-6 pr-4">
                <div class="flex items-center text-white gap-2">
                    <span class="text-sm font-semibold">Usuario</span>
                    <span class="material-symbols-outlined text-xl">account_circle</span>
                </div>
                <button class="flex items-center text-white gap-2 hover:bg-white/10 px-3 py-1 rounded transition-colors">
                    <span class="text-sm font-semibold">Salir</span>
                    <span class="material-symbols-outlined text-xl">logout</span>
                </button>
                <div class="h-12 flex items-center border-l border-white/30 pl-4 ml-2">
                    <img alt="Gobierno BA" class="h-10 w-auto object-contain brightness-0 invert" src="logosNavbar/logo BA esquina derecha.png"/>
                </div>
            </div>
        </header>

        <div class="flex flex-1">
            <!-- Sidebar -->
            <aside id="sidebar" class="w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col hidden lg:flex">
                <nav class="flex-1 p-4 space-y-2">
                    <a href="#" onclick="loadView('inicio')" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-100 transition-colors">
                        <span class="material-symbols-outlined">home</span>
                        <span>Inicio</span>
                    </a>
                    <a href="#" onclick="loadView('iniciarReintegro')" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary/10 text-primary font-bold transition-colors">
                        <span class="material-symbols-outlined">add_circle</span>
                        <span>Iniciar Reintegro</span>
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-100 transition-colors">
                        <span class="material-symbols-outlined">format_list_bulleted</span>
                        <span>Listado Reintegros</span>
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-100 transition-colors">
                        <span class="material-symbols-outlined">search</span>
                        <span>Buscar</span>
                    </a>
                </nav>
            </aside>

            <!-- Main Content Area -->
            <main class="flex-1 flex flex-col min-w-0 bg-slate-50 dark:bg-slate-950/30" id="main-content">
                <!-- Views will be loaded here -->
            </main>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
